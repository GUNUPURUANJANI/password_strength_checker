
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap');
  #psc-root{background:#0D1117;border-radius:16px;padding:2.5rem 2rem;font-family:'Rajdhani',sans-serif;min-height:520px;position:relative;overflow:hidden}
  #psc-root::before{content:'';position:absolute;top:-60px;left:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(0,255,159,0.07) 0%,transparent 70%);pointer-events:none}
  #psc-root::after{content:'';position:absolute;bottom:-80px;right:-40px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(31,111,235,0.08) 0%,transparent 70%);pointer-events:none}
  .psc-title{color:#fff;font-size:22px;font-weight:500;letter-spacing:2px;text-transform:uppercase;margin:0 0 4px;display:flex;align-items:center;gap:10px}
  .psc-subtitle{color:#4a5568;font-size:13px;letter-spacing:1px;margin:0 0 2rem;font-family:'Share Tech Mono',monospace}
  .lock-icon{width:28px;height:28px;display:flex;flex-direction:column;align-items:center}
  .lock-body{width:18px;height:14px;background:none;border:2px solid #00FF9F;border-radius:3px;position:relative}
  .lock-shackle{width:10px;height:8px;border:2px solid #00FF9F;border-bottom:none;border-radius:5px 5px 0 0;margin-bottom:-1px}
  .input-wrap{position:relative;margin-bottom:1.5rem}
  .psc-input{width:100%;box-sizing:border-box;background:#0a0e14;border:1.5px solid #1a2332;border-radius:10px;padding:14px 48px 14px 18px;font-size:17px;font-family:'Share Tech Mono',monospace;color:#e0e0e0;outline:none;letter-spacing:2px;transition:border-color .3s,box-shadow .3s}
  .psc-input:focus{border-color:#1F6FEB;box-shadow:0 0 0 3px rgba(31,111,235,0.15)}
  .toggle-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center}
  .eye-icon{width:20px;height:20px;opacity:.5;transition:opacity .2s}
  .toggle-btn:hover .eye-icon{opacity:.9}
  .meter-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .meter-label-text{font-size:12px;color:#4a5568;letter-spacing:1.5px;font-family:'Share Tech Mono',monospace}
  .strength-tag{font-size:13px;font-weight:600;letter-spacing:2px;font-family:'Rajdhani',sans-serif;transition:color .3s}
  .meter-bar{background:#111827;border-radius:4px;height:6px;overflow:hidden;margin-bottom:1.5rem}
  .meter-fill{height:100%;border-radius:4px;width:0%;transition:width .4s cubic-bezier(.4,0,.2,1),background .4s}
  .criteria-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
  .crit{display:flex;align-items:center;gap:8px;font-size:13px;color:#3d4d63;font-family:'Share Tech Mono',monospace;letter-spacing:.5px;transition:color .3s}
  .crit.met{color:#00FF9F}
  .crit-dot{width:8px;height:8px;border-radius:50%;background:#1a2332;transition:background .3s,box-shadow .3s;flex-shrink:0}
  .crit.met .crit-dot{background:#00FF9F;box-shadow:0 0 6px rgba(0,255,159,.6)}
  .entropy-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#0a0e14;border-radius:8px;border:1px solid #1a2332;margin-bottom:1rem}
  .entropy-label{font-size:12px;color:#4a5568;font-family:'Share Tech Mono',monospace;letter-spacing:1px}
  .entropy-val{font-size:15px;font-weight:600;color:#1F6FEB;font-family:'Share Tech Mono',monospace}
  .suggestions{min-height:36px;font-size:13px;font-family:'Share Tech Mono',monospace;color:#4a5568;letter-spacing:.5px;line-height:1.6}
  .suggestions span{color:#FFA500}
  .shield-ring{position:absolute;top:24px;right:24px;width:48px;height:48px;opacity:.18}
</style>

<div id="psc-root" role="main">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Password Strength Checker — enter a password to see its security rating</h2>

  <svg class="shield-ring" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M24 4L6 11v12c0 11 7.8 21.3 18 24 10.2-2.7 18-13 18-24V11L24 4z" stroke="#00FF9F" stroke-width="2" fill="none"/>
    <path d="M17 24l5 5 9-9" stroke="#00FF9F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <div class="psc-title">
    <div class="lock-icon">
      <div class="lock-shackle"></div>
      <div class="lock-body"></div>
    </div>
    Password Security
  </div>
  <p class="psc-subtitle">// STRENGTH ANALYZER v2.4.1</p>

  <div class="input-wrap">
    <input class="psc-input" id="pw" type="password" placeholder="Enter password..." autocomplete="off" spellcheck="false"/>
    <button class="toggle-btn" id="toggle" title="Toggle visibility">
      <svg class="eye-icon" id="eye-svg" viewBox="0 0 24 24" fill="none" stroke="#8899aa" stroke-width="1.8" stroke-linecap="round">
        <ellipse cx="12" cy="12" rx="9" ry="6"/><circle cx="12" cy="12" r="2.5"/>
      </svg>
    </button>
  </div>

  <div class="meter-label">
    <span class="meter-label-text">STRENGTH METER</span>
    <span class="strength-tag" id="strength-tag" style="color:#3d4d63">—</span>
  </div>
  <div class="meter-bar"><div class="meter-fill" id="meter-fill"></div></div>

  <div class="criteria-grid">
    <div class="crit" id="c-len"><div class="crit-dot"></div>8+ characters</div>
    <div class="crit" id="c-upper"><div class="crit-dot"></div>Uppercase A-Z</div>
    <div class="crit" id="c-lower"><div class="crit-dot"></div>Lowercase a-z</div>
    <div class="crit" id="c-num"><div class="crit-dot"></div>Numbers 0-9</div>
    <div class="crit" id="c-sym"><div class="crit-dot"></div>Symbols !@#$</div>
    <div class="crit" id="c-long"><div class="crit-dot"></div>12+ characters</div>
  </div>

  <div class="entropy-row">
    <span class="entropy-label">ENTROPY ESTIMATE</span>
    <span class="entropy-val" id="entropy-val">— bits</span>
  </div>

  <div class="suggestions" id="suggestions">Start typing to analyze your password...</div>
</div>

<script>
(function(){
  const pw=document.getElementById('pw');
  const fill=document.getElementById('meter-fill');
  const tag=document.getElementById('strength-tag');
  const ev=document.getElementById('entropy-val');
  const sug=document.getElementById('suggestions');
  const tog=document.getElementById('toggle');
  const input=document.getElementById('psc-root');

  const crits={len:'c-len',upper:'c-upper',lower:'c-lower',num:'c-num',sym:'c-sym',long:'c-long'};

  let visible=false;
  tog.addEventListener('click',()=>{
    visible=!visible;
    pw.type=visible?'text':'password';
    document.getElementById('eye-svg').innerHTML=visible
      ?'<ellipse cx="12" cy="12" rx="9" ry="6"/><line x1="4" y1="4" x2="20" y2="20"/>'
      :'<ellipse cx="12" cy="12" rx="9" ry="6"/><circle cx="12" cy="12" r="2.5"/>';
  });

  function entropy(p){
    let pool=0;
    if(/[a-z]/.test(p)) pool+=26;
    if(/[A-Z]/.test(p)) pool+=26;
    if(/[0-9]/.test(p)) pool+=10;
    if(/[^a-zA-Z0-9]/.test(p)) pool+=32;
    return pool>0?Math.round(p.length*(Math.log(pool)/Math.log(2))):0;
  }

  const levels=[
    {label:'VERY WEAK',color:'#FF4C4C',pct:12},
    {label:'WEAK',color:'#FF4C4C',pct:28},
    {label:'FAIR',color:'#FFA500',pct:52},
    {label:'STRONG',color:'#1F6FEB',pct:76},
    {label:'VERY STRONG',color:'#00FF9F',pct:100}
  ];

  pw.addEventListener('input',()=>{
    const v=pw.value;
    const checks={
      len:v.length>=8,
      upper:/[A-Z]/.test(v),
      lower:/[a-z]/.test(v),
      num:/[0-9]/.test(v),
      sym:/[^a-zA-Z0-9]/.test(v),
      long:v.length>=12
    };

    Object.entries(crits).forEach(([k,id])=>{
      const el=document.getElementById(id);
      el.classList.toggle('met',checks[k]);
    });

    const score=Object.values(checks).filter(Boolean).length;
    const ent=entropy(v);
    ev.textContent=v.length?ent+' bits':'— bits';

    if(!v.length){
      fill.style.width='0%';fill.style.background='#FF4C4C';
      tag.textContent='—';tag.style.color='#3d4d63';
      sug.innerHTML='Start typing to analyze your password...';
      return;
    }

    let lvl;
    if(score<=1) lvl=levels[0];
    else if(score<=2) lvl=levels[1];
    else if(score<=3) lvl=levels[2];
    else if(score<=4) lvl=levels[3];
    else lvl=levels[4];

    fill.style.width=lvl.pct+'%';
    fill.style.background=lvl.color;
    tag.textContent=lvl.label;
    tag.style.color=lvl.color;

    const tips=[];
    if(!checks.len) tips.push('<span>+</span> Use at least 8 characters');
    if(!checks.long) tips.push('<span>+</span> Go beyond 12 characters for extra security');
    if(!checks.upper) tips.push('<span>+</span> Add uppercase letters');
    if(!checks.lower) tips.push('<span>+</span> Mix in lowercase letters');
    if(!checks.num) tips.push('<span>+</span> Include numbers');
    if(!checks.sym) tips.push('<span>+</span> Add special symbols (!@#$%^&*)');

    sug.innerHTML=tips.length?tips.slice(0,2).join(' &nbsp;·&nbsp; '):'<span style="color:#00FF9F">✓</span>&nbsp; Excellent password — well secured.';
  });
})();
</script>
